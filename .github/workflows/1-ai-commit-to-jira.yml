name: "Phase 1 — AI Commit → Jira"

on:
  push:
    branches: [main]

jobs:
  create-jira-ticket:
    name: Analyze commit and create Jira ticket
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit for diff

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run AI Jira sync
        run: python scripts/ai-jira-sync.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_BASE_URL: https://stephaneguren.atlassian.net
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: SCRUM
          GIT_COMMIT_SHA: ${{ github.sha }}
          GIT_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          GITHUB_REPO: ${{ github.repository }}
