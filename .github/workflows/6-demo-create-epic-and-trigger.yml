name: "PoC Demo — Create Jira Epic + Trigger Test Workflow"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  demo-setup:
    name: Create Epic, child tickets, and kick off test workflow
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Create Epic + child tickets + trigger test workflow
        run: python scripts/create-epic-and-trigger.py
        env:
          JIRA_BASE_URL: https://stephaneguren.atlassian.net
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: SCRUM
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
