name: "Phase 7 — Jira Epic → Fully Automated Test Workflow"

on:
  workflow_dispatch:
    inputs:
      jira_epic_key:
        description: "Jira epic key (e.g. SCRUM-123)"
        required: true
        type: string
      jira_epic_title:
        description: "Jira epic title"
        required: true
        type: string
      jira_epic_description:
        description: "Epic context / acceptance criteria"
        required: false
        type: string
  repository_dispatch:
    types: [jira-epic-test-workflow]
  create:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  epic-test-orchestrator:
    name: Epic test orchestrator + visual dashboard
    runs-on: ubuntu-latest
    if: github.event_name != 'create' || github.event.ref_type == 'branch'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright Chromium
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Run unit tests with coverage
        id: unit
        continue-on-error: true
        run: cd frontend && npm run test:coverage

      - name: Run Playwright end-to-end tests
        id: e2e
        continue-on-error: true
        run: cd frontend && npx playwright test
        env:
          CI: true
          NEXT_PUBLIC_STRAPI_URL: http://localhost:1999

      - name: Install AI-analysis dependencies
        if: always()
        run: pip install anthropic requests

      - name: Build AI triage + visual dashboard + optional PR
        if: always()
        run: python scripts/ai-full-test-workflow.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GIT_EVENT_NAME: ${{ github.event_name }}
          GIT_EVENT_REF: ${{ github.event.ref }}
          JIRA_BASE_URL: https://stephaneguren.atlassian.net
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EPIC_KEY: ${{ github.event.inputs.jira_epic_key || github.event.client_payload.jira_epic_key }}
          JIRA_EPIC_TITLE: ${{ github.event.inputs.jira_epic_title || github.event.client_payload.jira_epic_title }}
          JIRA_EPIC_DESCRIPTION: ${{ github.event.inputs.jira_epic_description || github.event.client_payload.jira_epic_description }}
          UNIT_OUTCOME: ${{ steps.unit.outcome }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          PLAYWRIGHT_RESULTS_FILE: frontend/test-results/results.json
          COVERAGE_SUMMARY_FILE: frontend/coverage/coverage-summary.json

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload Playwright JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-json
          path: frontend/test-results/results.json
          retention-days: 14

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: frontend/coverage/
          retention-days: 14

      - name: Upload AI workflow dashboard + summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-workflow-dashboard
          path: automation-reports/
          retention-days: 14

      - name: Assemble GitHub Pages site
        if: always()
        run: |
          mkdir -p _site
          # AI dashboard + triage report + JSON summary
          cp -r automation-reports/. _site/ 2>/dev/null || true
          # Dashboard is the landing page
          if [ -f _site/dashboard.html ]; then cp _site/dashboard.html _site/index.html; fi
          # Full Playwright HTML report
          if [ -d frontend/playwright-report ]; then
            mkdir -p _site/playwright-report && cp -r frontend/playwright-report/. _site/playwright-report/
          fi
          # Istanbul/V8 coverage HTML report
          if [ -d frontend/coverage ]; then
            mkdir -p _site/coverage && cp -r frontend/coverage/. _site/coverage/
          fi
          # Fallback landing page if the dashboard was never produced
          if [ ! -f _site/index.html ]; then
            echo "<!doctype html><meta charset=utf-8><title>AI test report</title><h1>Report unavailable</h1><p>The orchestrator did not produce a dashboard for this run.</p>" > _site/index.html
          fi
          echo "Assembled _site:"; find _site -maxdepth 2 -type f | head -40

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Fail workflow if tests failed or coverage gate failed
        if: steps.unit.outcome == 'failure' || steps.e2e.outcome == 'failure'
        run: exit 1

  deploy-pages:
    name: Deploy report to GitHub Pages
    needs: epic-test-orchestrator
    # Deploy even when the test gate fails (failing runs are the interesting demo case),
    # but skip when the orchestrator itself was skipped (e.g. non-branch create events).
    if: always() && needs.epic-test-orchestrator.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    # Serialize only the deployments, so parallel test runs are not blocked.
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish live report URL to run summary
        if: always()
        run: |
          {
            echo "## 🌐 Live AI test report"
            echo ""
            echo "Published to GitHub Pages: ${{ steps.deployment.outputs.page_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
