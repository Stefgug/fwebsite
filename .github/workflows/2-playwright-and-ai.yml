name: "Phase 2-3-4 — Playwright + AI Analysis + Auto-Fix PR"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write   # Phase 4: push fix branch
  pull-requests: write

jobs:
  playwright:
    name: Run Playwright tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true   # let subsequent steps run; we fail explicitly at the end
        run: cd frontend && npx playwright test
        env:
          NEXT_PUBLIC_STRAPI_URL: http://localhost:1999
          CI: true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-json
          path: frontend/test-results/results.json
          retention-days: 7

      # Phase 3+4: AI analysis + Jira report + auto-fix PR — only on failure
      - name: Setup Python for AI analysis
        if: steps.playwright.outcome == 'failure'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: steps.playwright.outcome == 'failure'
        run: pip install anthropic requests

      - name: Configure git for auto-fix branch
        if: steps.playwright.outcome == 'failure'
        run: |
          git config user.email "ci-bot@shopgeneric.dev"
          git config user.name "ShopGeneric CI Bot"

      - name: AI analysis + Jira report + auto-fix PR
        if: steps.playwright.outcome == 'failure'
        run: python scripts/analyze-failure-and-fix.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_BASE_URL: https://stephaneguren.atlassian.net
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: SCRUM
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GIT_COMMIT_SHA: ${{ github.sha }}
          RESULTS_FILE: frontend/test-results/results.json

      - name: Fail the job if tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1
