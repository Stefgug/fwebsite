name: "Demo Reset — Delete all Jira issues"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DELETE to confirm (safety check)"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  reset:
    name: Delete all issues in SCRUM
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DELETE'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests
      - name: Delete all Jira issues
        run: python scripts/jira-reset.py
        env:
          JIRA_BASE_URL: https://stephaneguren.atlassian.net
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: SCRUM

      - name: Delete demo branch
        run: |
          git push origin --delete demo/break-login-link 2>/dev/null || echo "Branch does not exist, skipping"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}